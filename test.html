<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    * {
      margin: 0;
      padding: 0;
    }

    #wrap {
      width: 100%;
    }

    #header {
      height: 100px;
      background-color: #E0F2F1;
    }

    #section {
      height: 880px;
      background-color: #26A69A;
    }

    #footer {
      height: 100px;
      background-color: #00897B;
    }

    .container {
      background-color: rgba(255, 255, 255, 0.3);
      width: 1200px;
      margin: 0 auto;
      height: inherit;
      overflow: hidden;
    }

    .container .header {
      height: 100px;
      background-color: #B2DFDB;
    }

    .container .aside {
      width: 300px;
      height: 880px;
      background-color: #4DB6AC;
      float: left;
    }

    .container .ad1 {
      width: 300px;
      height: 300px;
      background-color: #68EEE2;
      float: left;
    }

    .container .ad2 {
      width: 300px;
      height: 300px;
      background-color: #5CDDD1;
      float: left;
    }

    .container .ad3 {
      width: 300px;
      height: 300px;
      background-color: #68EEE2;
      float: left;
    }

    .container .ad4 {
      width: 900px;
      height: 300px;
      background-color: #009688;
      float: left;
    }

    .container .ad5 {
      width: 450px;
      height: 280px;
      background-color: #39D1C3;
      float: left;
    }

    .container .ad6 {
      width: 450px;
      height: 280px;
      background-color: #68D3C9;
      float: left;
    }

    .container .footer {
      height: 100px;
      background-color: #00796B;
    }
  </style>
</head>

<body>
  <div id="wrap">
    <div id="header">
      <div class="container">
        <div class="header"></div>
      </div>
    </div>
    <div id="section">
      <div class="container">
        <div class="aside"></div>
        <div class="ad1"></div>
        <div class="ad2"></div>
        <div class="ad3"></div>
        <div class="ad4"></div>
        <div class="ad5"></div>
        <div class="ad6"></div>
      </div>
    </div>
    <div id="footer">
      <div class="container">
        <div class="footer"></div>
      </div>
    </div>
  </div>
</body>

</html>
