<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        #wrap {
            width: 100%;
        }

        #header {
            height: 100px;
            background-color: #E0F2F1;
        }

        #section {
            height: 880px;
            background-color: #26A69A;
            overflow: hidden;
        }

        #footer {
            height: 100px;
            background-color: #00897B;
        }

        .container {
            width: 1200px;
            background-color: rgba(255, 255, 255, 0.3);
            margin: 0 auto;
            height: inherit;
        }

        #header .container .header {
            height: 100px;
            background-color: #B2DFDB;
        }

        #section .container .aside {
            width: 300px;
            height: 880px;
            background-color: #4DB6AC;
            float: left;
        }

        #section .container .article1 {
            width: 300px;
            height: 300px;
            background: #68EEE2;
            float: left;
        }

        #section .container .article2 {
            width: 300px;
            height: 300px;
            background-color: #5CDDD1;
            float: left;
        }

        #section .container .article3 {
            width: 300px;
            height: 300px;
            background-color: #68EEE2;
            float: left;
        }

        #section .container .ad {
            width: 900px;
            height: 300px;
            background-color: #009688;
            float: left;
        }

        #section .container .box1 {
            width: 450px;
            height: 278px;
            background-color: #39D1C3;
            float: left;
        }

        #section .container .box2 {
            width: 450px;
            height: 278px;
            background-color: #68D3C9;
            float: left;
        }

        #footer .container{
            height: 100px;
            background-color: #00796B;
        }
    </style>
</head>

<body>
    <div id="wrap">
        <div id="header">
            <div class="container">
                <div class="header"></div>
            </div>
        </div>
        <div id="section">
            <div class="container">
                <div class="aside"></div>
                <div class="article1"></div>
                <div class="article2"></div>
                <div class="article3"></div>
                <div class="ad"></div>
                <div class="box1"></div>
                <div class="box2"></div>
            </div>
        </div>
        <div id="footer">
            <div class="container">
                <div class="footer"></div>
            </div>
        </div>
    </div>
</body>

</html>
