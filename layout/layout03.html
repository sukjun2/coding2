<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레이아웃3</title>
</head>
<style>
    * {
        margin: 0;
    }

    body {
        background-color: rgb(239, 250, 255);
    }

    #wrap {
        width: 1200px;
        margin: 0 auto;
    }

    #header {
        width: 1200px;
        height: 100px;
        background-color: rgb(217, 251, 253);
    }

    #nav {
        width: 1200px;
        height: 100px;
        background-color: rgb(184, 231, 231);
    }

    #aside {
        width: 300px;
        height: 780px;
        background-color: rgb(141, 200, 202);
        float: left;
    }

    #section_01 {
        width: 900px;
        height: 260px;
        background-color: rgb(93, 159, 168);
        float: left;
    }

    #section_02 {
        width: 900px;
        height: 260px;
        background-color: rgb(51, 135, 146);
        float: left;
    }

    #section_03 {
        width: 900px;
        height: 260px;
        background-color: rgb(31, 93, 97);
        float: left;
    }

    #footer {
        width: 1200px;
        height: 100px;
        background-color: rgb(10, 61, 63);
        clear: both;
    }
</style>

<body>
    <div id="wrap">
        <div id="header"></div>
        <div id="nav"></div>
        <div id="aside"></div>
        <div id="section_01"></div>
        <div id="section_02"></div>
        <div id="section_03"></div>
        <div id="footer"></div>
    </div>
</body>

</html>
