<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            font-size: 50px;
        }

        #wrap {
            width: 1200px;
            margin: 0 auto;
        }

        #header {
            width: 1200px;
            height: 100px;
            overflow: hidden;
        }

        #header .logo {
            width: 300px;
            height: 100px;
            background-color: #981717;
            float: left;
            line-height: 100px;
            color: white;
            text-align: center;
        }

        #header .menu {
            width: 900px;
            height: 100px;
            background-color: #D08686;
            float: left;
            line-height: 100px;
            color: white;
            text-align: center;
        }

        #banner {
            width: 1200px;
            height: 400px;
            overflow: hidden;
        }

        #banner .image {
            width: 800px;
            height: 400px;
            background-color: #955757;
            float: left;
            line-height: 400px;
            color: white;
            text-align: center;
        }

        #banner .ppl {
            width: 400px;
            height: 400px;
            background-color: #AF5E5E;
            float: left;
            line-height: 400px;
            color: white;
            text-align: center;
        }

        #section {
            width: 1200px;
            height: 300px;
            overflow: hidden;
        }

        #section .box1 {
            width: 400px;
            height: 300px;
            background-color: #6F4242;
            float: left;
            line-height: 300px;
            color: white;
            text-align: center;
        }

        #section .box2 {
            width: 400px;
            height: 300px;
            background-color: #5A3C3C;
            float: left;
            line-height: 300px;
            color: white;
            text-align: center;
        }

        #section .box3 {
            width: 400px;
            height: 300px;
            background-color: #4F4343;
            float: left;
            line-height: 300px;
            color: white;
            text-align: center;
        }

        #footer {
            width: 1200px;
            height: 100px;
            overflow: hidden;
        }

        #footer .footer1 {
            width: 200px;
            height: 100px;
            background-color: #3D2C2C;
            float: left;
            line-height: 100px;
            color: white;
            text-align: center;
        }

        #footer .footer2 {
            width: 800px;
            height: 100px;
            background-color: #7A6666;
            float: left;
            line-height: 100px;
            color: white;
            text-align: center;
        }

        #footer .footer3 {
            width: 200px;
            height: 100px;
            background-color: #654D4D;
            float: left;
            line-height: 100px;
            color: white;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="wrap">
        <div id="header">
            <div class="logo">로고</div>
            <div class="menu">
                <script>
                    {
                        for (let j = 1; j < 14; j++) {
                            document.write(j);
                        }
                    }
                </script>
            </div>
        </div>
        <div id="banner">
            <div class="image">
                <script>
                    {
                        for (let i = 1; i <= 9; i += 2) {
                            document.write(i);
                        }
                    }
                </script>
            </div>
            <div class="ppl">광고</div>
        </div>
        <div id="section">
            <div class="box1">공지사항</div>
            <div class="box2">갤러리</div>
            <div class="box3">팝업</div>
        </div>
        <div id="footer">
            <div class="footer1">푸터</div>
            <div class="footer2">COPYRIGHT</div>
            <div class="footer3">SNS</div>
        </div>
    </div>
</body>

</html>
