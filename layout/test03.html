<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        #wrap {
            width: 100%;
            text-align: center;
            font-size: 50px;
        }

        #header {
            height: 100px;
            background-color: #F48080;
            overflow: hidden;
            color: #fff;
            line-height: 100px;
        }

        #banner {
            height: 400px;
            background-color: #EC5C5C;
        }

        #ad {
            height: 500px;
            background-color: #FEA5A5;
            overflow: hidden;
            color: #fff;
            line-height: 250px;
        }

        #notice {
            height: 500px;
            background-color: #FFBFBF;
            overflow: hidden;
            color: #fff;
            line-height: 250px;
        }

        #footer {
            height: 100px;
            background-color: #FF9C9C;
            color: #fff;
            line-height: 100px;
        }

        .container {
            width: 1200px;
            background-color: rgba(255, 255, 255, 0.3);
            margin: 0 auto;
            height: inherit;
        }

        #header .container .header1 {
            width: 300px;
            height: 100px;
            background-color: #F86464;
            float: left;
        }

        #header .container .header2 {
            width: 900px;
            height: 100px;
            background-color: #FEA5A5;
            float: left;
        }

        #ad .container .ad_top {
            width: 1200px;
            float: left;
        }

        #ad .container .ad_top .ad1 {
            width: 200px;
            height: 250px;
            background-color: #F39C9C;
            float: left;
        }

        #ad .container .ad_top .ad2 {
            width: 200px;
            height: 250px;
            background-color: #EA8686;
            float: left;
        }

        #ad .container .ad_top .ad3 {
            width: 200px;
            height: 250px;
            background-color: #EE7C7C;
            float: left;
        }

        #ad .container .ad_top .ad4 {
            width: 200px;
            height: 250px;
            background-color: #C87575;
            float: left;
        }

        #ad .container .ad_top .ad5 {
            width: 200px;
            height: 250px;
            background-color: #EB7B7B;
            float: left;
        }

        #ad .container .ad_top .ad6 {
            width: 200px;
            height: 250px;
            background-color: #D66B6B;
            float: left;
        }

        #ad .container .ad_bom {
            width: 1200px;
            height: 500px;
            background-color: #EA7F7F;
            float: left;
        }

        #notice .container .notice1 {
            width: 740px;
            height: 500px;
            background-color: #EB6666;
            float: left;
            line-height: 500px;
        }

        #notice .container .notice2 {
            width: 460px;
            height: 265px;
            background-color: #CE5F5F;
            float: left;
            line-height: 265px;
        }

        #notice .container .notice3 {
            width: 460px;
            height: 500px;
            background-color: #FE7F7F;
            float: left;
            line-height: 235px;
        }

        #footer .container {
            width: 1200px;
            height: 100px;
            background-color: #FF8888;
        }
    </style>
</head>

<body>
    <div id="wrap">
        <div id="header">
            <div class="container">
                <div class="header1"></div>
                <div class="header2"></div>
            </div>
        </div>
        <div id="banner">
            <div class="container">
                <div class="banner"></div>
            </div>
        </div>
        <div id="ad">
            <div class="container">
                <div class="ad_top">
                    <div class="ad1"></div>
                    <div class="ad2"></div>
                    <div class="ad3"></div>
                    <div class="ad4"></div>
                    <div class="ad5"></div>
                    <div class="ad6"></div>
                </div>
                <div class="ad_bom">
                    <div class="ad7"></div>
                </div>
            </div>
        </div>
        <div id="notice">
            <div class="container">
                <div class="notice1"></div>
                <div class="notice2"></div>
                <div class="notice3"></div>
            </div>
        </div>
        <div id="footer">
            <div class="container">
                <div class="footer"></div>
            </div>
        </div>
    </div>

    <script>
        //배열
        // {
        //     let arr = ["로고", "메뉴", "광고1", "광고2", "광고3", "광고4", "광고5", "광고6", "광고7", "공지사항1", "공지사항2", "공지사항3", "푸터"];
        //     document.querySelector(".header1").innerHTML = arr[0];
        //     document.querySelector(".header2").innerHTML = arr[1];
        //     document.querySelector(".ad1").innerHTML = arr[2];
        //     document.querySelector(".ad2").innerHTML = arr[3];
        //     document.querySelector(".ad3").innerHTML = arr[4];
        //     document.querySelector(".ad4").innerHTML = arr[5];
        //     document.querySelector(".ad5").innerHTML = arr[6];
        //     document.querySelector(".ad6").innerHTML = arr[7];
        //     document.querySelector(".ad7").innerHTML = arr[8];
        //     document.querySelector(".notice1").innerHTML = arr[9];
        //     document.querySelector(".notice2").innerHTML = arr[10];
        //     document.querySelector(".notice3").innerHTML = arr[11];
        //     document.querySelector(".footer").innerHTML = arr[12];
        // }

        //객체
        {
            let obj = {a:"로고", b:"메뉴", c:"광고1", d:"광고2", e:"광고3", f:"광고4", g:"광고5", h:"광고6", i:"광고7", j:"공지사항1", k:"공지사항2", l:"공지사항3", m:"푸터"};

            document.querySelector(".header1").innerHTML = obj.a;
            document.querySelector(".header2").innerHTML = obj.b;
            document.querySelector(".ad1").innerHTML = obj.c;
            document.querySelector(".ad2").innerHTML = obj.d;
            document.querySelector(".ad3").innerHTML = obj.e;
            document.querySelector(".ad4").innerHTML = obj.f;
            document.querySelector(".ad5").innerHTML = obj.g;
            document.querySelector(".ad6").innerHTML = obj.h;
            document.querySelector(".ad7").innerHTML = obj.i;
            document.querySelector(".notice1").innerHTML = obj.j;
            document.querySelector(".notice2").innerHTML = obj.k;
            document.querySelector(".notice3").innerHTML = obj.l;
            document.querySelector(".footer").innerHTML = obj.m;
        }

        // for문
        {
            document.querySelector(".banner").innerHTML = "<span style = 'color : white'><br><br>이미지 슬라이드<br></span>"

            for (let i = 2; i <= 18; i += 2) {
                if (i % 4 == 0) {
                    document.querySelector(".banner").innerHTML += "<span style = 'color : white'>" + "&nbsp;" + i + "</span>";
                } else {
                    document.querySelector(".banner").innerHTML += "&nbsp;" + i;
                }
            }
        }

    </script>
</body>

</html>
