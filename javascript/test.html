<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 1. 선언적 함수
        {
            function func() {
                document.write("함수가 실행되었습니다.1");
            }
            func();
        }
        // 2. 익명 함수
        {
            const func = function () {
                document.write("함수가 실행되었습니다.2");
            }
            func();
        }
        // 3. 매개변수 함수
        {
            function func(str) {
                document.write(str);
            }
            func("함수가 실행되었습니다.3");
        }
        // 4. 리턴값 함수
        {
            function func() {
                const str = "함수가 실행되었습니다.4";
                return str;
            }
            document.write(func());
        }
        // 5. 화살표 함수
        {
            func = () => {
                document.write("함수가 실행되었습니다.5");
            }
            func();
        }
        // 6. 화살표 함수
        {
            const func = () => {
                document.write("함수가 실행되었습니다.6");
            }
            func();
        }
        // 7. 화살표 함수
        {
            func = str => {
                document.write(str);
            }
            func("함수가 실행되었습니다.7")
        }
        // 8. 화살표 함수
        {
            func = () => {
                const str = "함수가 실행되었습니다.8"
                return str;
            }
            document.write(func());
        }

        //
        {
            for (i = 0; i < 10; i++) {
                document.write(i);
            }
        }
    </script>
</body>

</html>
